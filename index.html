
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchemeGenie - Academic Scheme Book Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            @page { 
              size: A4 landscape; 
              margin: 5mm; 
            }
            body { 
              background: white !important; 
              margin: 0; 
              padding: 0;
            }
            table { 
              width: 100% !important;
              table-layout: fixed !important;
              border-collapse: collapse !important;
            }
            th, td { 
              font-size: 6pt !important; 
              padding: 1pt !important;
              line-height: 1.1 !important;
              word-wrap: break-word !important;
              overflow-wrap: break-word !important;
            }
            .term-header {
              background-color: #f1f5f9 !important;
              color: black !important;
              -webkit-print-color-adjust: exact;
            }
        }
        @keyframes progress-indeterminate {
          0% { transform: scaleX(0.1) translateX(-100%); }
          50% { transform: scaleX(0.4) translateX(50%); }
          100% { transform: scaleX(0.1) translateX(120%); }
        }
        .animate-progress-indeterminate {
          animation: progress-indeterminate 2s infinite linear;
        }
        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          25% { transform: translateX(-5px); }
          75% { transform: translateX(5px); }
        }
        .animate-shake {
          animation: shake 0.2s ease-in-out 0s 2;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <!-- Entry point for Vite to transpile and bundle the app -->
    <script type="module" src="/index.tsx"></script>
</body>
</html>
